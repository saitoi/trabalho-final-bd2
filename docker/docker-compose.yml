services:
  mongo1:
    image: mongo:7.0
    container_name: bd2-mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
      - mongo1_config:/data/configdb
    networks:
      - bd2_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  mongo2:
    image: mongo:7.0
    container_name: bd2-mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
      - mongo2_config:/data/configdb
    networks:
      - bd2_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  mongo3:
    image: mongo:7.0
    container_name: bd2-mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
      - mongo3_config:/data/configdb
    networks:
      - bd2_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  mongo-init-replica:
    image: mongo:7.0
    container_name: bd2-mongo-init-replica
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    volumes:
      - ./init-replica-set.js:/docker-entrypoint-initdb.d/init-replica-set.js:ro
    networks:
      - bd2_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    entrypoint: ["/bin/bash"]
    command:
      - "-lc"
      - |
        set -e
        echo "Checking replica set status..."
        RS_STATUS=$$(mongosh --host mongo1:27017 --quiet --eval 'try { rs.status().ok } catch (e) { 0 }')
        if [ "$$RS_STATUS" = "1" ]; then
          echo "Replica set already initialized."
          exit 0
        fi
        mongosh --host mongo1:27017 /docker-entrypoint-initdb.d/init-replica-set.js

  mongo-express:
    image: mongo-express:1.0.2
    container_name: bd2-mongo-express
    profiles:
      - tools
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://host.docker.internal:27017,host.docker.internal:27018,host.docker.internal:27019/?replicaSet=rs0
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - bd2_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  mongo1_data:
  mongo1_config:
  mongo2_data:
  mongo2_config:
  mongo3_data:
  mongo3_config:

networks:
  bd2_net:
    name: bd2_net
    driver: bridge
